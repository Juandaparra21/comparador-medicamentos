<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="farmiTeal" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#2bd2b6"/>
      <stop offset="1" stop-color="#0d9a8a"/>
    </linearGradient>
    <linearGradient id="farmiBlue" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#2a60d0"/>
      <stop offset="1" stop-color="#12207a"/>
    </linearGradient>
    <clipPath id="farmiCapsule">
      <rect x="160" y="78" width="192" height="356" rx="96"/>
    </clipPath>
  </defs>

  <g transform="rotate(20 256 256)">
    <g clip-path="url(#farmiCapsule)">
      <!-- white base so the diagonal split shows through -->
      <rect x="150" y="68" width="212" height="376" fill="#ffffff"/>
      <!-- teal upper section, diagonal lower edge -->
      <polygon points="150,68 362,68 362,250 150,300" fill="url(#farmiTeal)"/>
      <!-- blue lower section, diagonal upper edge (leaves a white diagonal gap) -->
      <polygon points="150,330 362,280 362,444 150,444" fill="url(#farmiBlue)"/>
      <!-- soft gloss on the teal cap -->
      <ellipse cx="208" cy="138" rx="40" ry="22" fill="#ffffff" opacity="0.22"/>
    </g>

    <!-- white F -->
    <g fill="#ffffff">
      <rect x="196" y="150" width="46" height="214" rx="9"/>
      <rect x="196" y="150" width="132" height="46" rx="9"/>
      <rect x="196" y="248" width="106" height="44" rx="9"/>
    </g>
  </g>
</svg>
